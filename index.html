<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-container">
        <h2>Weather Forecast</h2>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
            <button id="search-btn">Search</button>
        </div>

        <p id="error-msg" class="error-msg hidden"></p>

        <div id="weather-card" class="weather-card hidden">
            <h3 id="location">City, Country</h3>
            <img id="weather-icon" src="" alt="Weather Icon">
            <h1 id="temperature">--°C</h1>
            <p id="description">Condition</p>
            
            <div class="weather-details">
                <div class="detail-item">
                    <span class="label">Humidity:</span>
                    <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind Speed:</span>
                    <span id="wind-speed">-- m/s</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
